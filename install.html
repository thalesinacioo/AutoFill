<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AutoFill instalado!</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 48px 40px;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
    }

    .icon img {
      width: 80px;
      height: 80px;
      margin-bottom: 16px;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }

    .inline-icon {
      width: 18px;
      height: 18px;
      vertical-align: middle;
      position: relative;
      top: -1px;
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 8px;
    }

    .subtitle {
      color: #666;
      font-size: 15px;
      margin-bottom: 32px;
    }

    .pin-box {
      background: #fffbe6;
      border: 1.5px solid #f0c000;
      border-radius: 12px;
      padding: 20px 24px;
      margin-bottom: 28px;
      text-align: left;
    }

    .pin-box strong {
      display: block;
      font-size: 14px;
      color: #7a5a00;
      margin-bottom: 10px;
    }

    .pin-steps {
      list-style: none;
      counter-reset: steps;
    }

    .pin-steps li {
      counter-increment: steps;
      display: flex;
      align-items: flex-start;
      gap: 10px;
      font-size: 14px;
      color: #555;
      margin-bottom: 8px;
    }

    .pin-steps li:last-child { margin-bottom: 0; }

    .pin-steps li::before {
      content: counter(steps);
      background: #f0c000;
      color: #fff;
      font-weight: 700;
      font-size: 11px;
      min-width: 20px;
      height: 20px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 1px;
    }

    kbd {
      background: #eee;
      border: 1px solid #ccc;
      border-radius: 4px;
      padding: 1px 5px;
      font-size: 12px;
      font-family: monospace;
    }

    .btn {
      display: inline-block;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px 28px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s;
    }

    .btn:hover { background: #1d4ed8; }

    .close-hint {
      margin-top: 14px;
      font-size: 13px;
      color: #aaa;
      cursor: pointer;
    }

    .close-hint:hover { color: #888; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon"><img src="icons/icon128.png" alt="AutoFill" /></div>
    <h1>AutoFill instalado!</h1>
    <p class="subtitle">Salve textos e preencha campos com um clique direito.</p>

    <div class="pin-box">
      <strong><img src="icons/pin.svg" class="inline-icon" alt="pin" /> Fixe a extensão para acesso rápido:</strong>
      <ol class="pin-steps">
        <li>Clique no ícone <img src="icons/extension.svg" class="inline-icon" alt="extensões" /> na barra do Chrome</li>
        <li>Encontre <strong>AutoFill</strong> na lista</li>
        <li>Clique no ícone <img src="icons/pin.svg" class="inline-icon" alt="pin" /> ao lado para fixar</li>
      </ol>
    </div>

    <button class="btn" onclick="window.close()">Entendido!</button>
    <p class="close-hint" onclick="window.close()">Fechar</p>
  </div>
</body>
</html>
